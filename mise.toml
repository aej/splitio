[tools]
erlang = "27"
elixir = "1.19.3"

[env]
_.file = ".env"

[tasks.setup]
description = "Install Hex, Rebar, and Elixir dependencies"
run = "mix local.hex --force && mix local.rebar --force && mix deps.get"

[tasks.test]
description = "Run unit tests"
run = "mix test"

[tasks.test-integration]
description = "Run integration tests with env loaded from .env"
run = "mix test --only integration"

[tasks.loadtest]
description = "Run the default sustained load test"
run = "mix loadtest --sustained"

[tasks.loadtest-quick]
description = "Run a short local smoke load test"
run = "mix loadtest --quick"

[tasks.loadtest-none]
description = "Run the sustained load test with impressions disabled"
run = "mix loadtest --sustained --impressions none"

[tasks.loadtest-ci]
description = "Run both CI load-test modes with threshold checks"
run = "mix loadtest --sustained --ci --impressions optimized && mix loadtest --sustained --ci --impressions none"
