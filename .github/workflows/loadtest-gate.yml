name: Load Test Gate

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, unlabeled]

permissions:
  contents: read
  statuses: write

jobs:
  refresh-gate:
    name: Refresh Load Test Gate
    runs-on: ubuntu-latest

    steps:
      - name: Refresh load test gate status
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const labels = context.payload.pull_request.labels.map((label) => label.name);
            const hasLoadtest = labels.includes('loadtest');

            const state = hasLoadtest ? 'failure' : 'success';
            const description = hasLoadtest
              ? 'Current HEAD has not been load-tested. Re-add the loadtest label to run it.'
              : 'Loadtest label not present; merge gate bypassed.';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'Load Test Gate',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/pull/${context.payload.pull_request.number}`,
              description
            });
